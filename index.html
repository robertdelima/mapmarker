<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreador OSM - Compartilhamento GPS</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; }
        #header { background: #2c3e50; color: white; padding: 12px; text-align: center; z-index: 1000; }
        #map { height: 40vh; width: 100%; flex-shrink: 0; }
        
        .container { padding: 15px; flex-grow: 1; overflow-y: auto; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        
        button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn-save { background: #27ae60; color: white; flex: 1; font-size: 1rem; }
        
        .location-list { list-style: none; padding: 0; margin: 0; }
        .location-item { 
            background: white; margin-bottom: 10px; padding: 12px; border-radius: 8px;
            display: flex; flex-direction: column; gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 5px solid #2980b9;
        }
        .item-main { display: flex; justify-content: space-between; align-items: center; }
        .location-info { cursor: pointer; flex-grow: 1; }
        .location-info strong { color: #2c3e50; display: block; }
        
        .item-actions { display: flex; gap: 8px; border-top: 1px solid #eee; pt: 8px; padding-top: 8px; }
        .btn-action { font-size: 0.8rem; padding: 6px 10px; flex: 1; }
        .btn-share { background: #3498db; color: white; }
        .btn-edit { background: #f39c12; color: white; }
        .btn-delete { background: #e74c3c; color: white; }
        
        #status { font-size: 0.8rem; color: #bdc3c7; }
    </style>
</head>
<body>

    <div id="header">
        <strong>📍 Gerenciador de Localização</strong>
        <div id="status">Iniciando mapa...</div>
    </div>

    <div id="map"></div>

    <div class="container">
        <div class="controls">
            <button class="btn-save" onclick="saveCurrentLocation()">💾 Salvar Localização</button>
        </div>

        <ul id="locationList" class="location-list"></ul>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        let map, userMarker, userPos = null;
        let savedMarkersLayer = L.layerGroup();

        function initMap() {
            map = L.map('map').setView([0, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            savedMarkersLayer.addTo(map);
            startTracking();
            renderList();
        }

        function startTracking() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((position) => {
                    userPos = { lat: position.coords.latitude, lng: position.coords.longitude };
                    if (!userMarker) {
                        userMarker = L.circleMarker([userPos.lat, userPos.lng], { radius: 8, fillColor: "#3498db", color: "#fff", weight: 2, fillOpacity: 0.8 }).addTo(map);
                        map.setView([userPos.lat, userPos.lng], 16);
                    } else {
                        userMarker.setLatLng([userPos.lat, userPos.lng]);
                    }
                    document.getElementById('status').innerText = "Sinal GPS OK";
                }, null, { enableHighAccuracy: true });
            }
        }

        function saveCurrentLocation() {
            if (!userPos) return alert("Aguardando GPS...");
            const name = prompt("Nome do local:");
            if (!name) return;

            const savedData = JSON.parse(localStorage.getItem('osmLocations') || '[]');
            savedData.push({
                id: Date.now(),
                name: name,
                lat: userPos.lat,
                lng: userPos.lng,
                date: new Date().toLocaleString('pt-BR')
            });
            localStorage.setItem('osmLocations', JSON.stringify(savedData));
            renderList();
        }

        // --- FUNÇÃO DE COMPARTILHAR ---
        async function shareLocation(name, lat, lng) {
            const gMapsUrl = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
            const wazeUrl = `https://waze.com/ul?ll=${lat},${lng}&navigate=yes`;
            
            const shareText = `📍 Localização de: ${name}\n\nGoogle Maps: ${gMapsUrl}\n\nWaze: ${wazeUrl}`;

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: `Localização: ${name}`,
                        text: shareText,
                        url: gMapsUrl // Link principal
                    });
                } catch (err) {
                    console.log("Compartilhamento cancelado");
                }
            } else {
                // Fallback para navegadores desktop que não suportam Share API
                prompt("Copie os links abaixo:", shareText);
            }
        }

        function deleteLocation(id) {
            if (confirm("Excluir este local?")) {
                let data = JSON.parse(localStorage.getItem('osmLocations') || '[]');
                localStorage.setItem('osmLocations', JSON.stringify(data.filter(p => p.id !== id)));
                renderList();
            }
        }

        function editLocation(id) {
            let data = JSON.parse(localStorage.getItem('osmLocations') || '[]');
            const idx = data.findIndex(p => p.id === id);
            const newName = prompt("Novo nome:", data[idx].name);
            if (newName) {
                data[idx].name = newName;
                localStorage.setItem('osmLocations', JSON.stringify(data));
                renderList();
            }
        }

        function renderList() {
            const listElement = document.getElementById('locationList');
            const savedData = JSON.parse(localStorage.getItem('osmLocations') || '[]');
            listElement.innerHTML = '';
            savedMarkersLayer.clearLayers();

            savedData.forEach((point) => {
                L.marker([point.lat, point.lng]).addTo(savedMarkersLayer).bindPopup(point.name);

                const li = document.createElement('li');
                li.className = 'location-item';
                li.innerHTML = `
                    <div class="item-main">
                        <div class="location-info" onclick="map.setView([${point.lat}, ${point.lng}], 18)">
                            <strong>${point.name}</strong>
                            <small>${point.date}</small>
                        </div>
                    </div>
                    <div class="item-actions">
                        <button class="btn-action btn-share" onclick="shareLocation('${point.name}', ${point.lat}, ${point.lng})">📤 Compartilhar</button>
                        <button class="btn-action btn-edit" onclick="editLocation(${point.id})">✎</button>
                        <button class="btn-action btn-delete" onclick="deleteLocation(${point.id})">✕</button>
                    </div>
                `;
                listElement.appendChild(li);
            });
        }

        window.onload = initMap;
    </script>
</body>
</html>
